<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1320, initial-scale=1">
<title>Deck Title</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,600..900;1,9..144,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<style>
/* =====================================================================
   template-besharp design system — teal/amber serif pitch-deck theme
   Fixed slide canvas: 1280 × 720 px (= 13.333in × 7.5in at 96dpi → print-exact 16:9)
   ===================================================================== */
:root {
  --teal-dk:#0A3945; --teal:#0E4A5A; --teal-mid:#156B7A;
  --light:#F2F7F8; --amber:#E9A13B; --ink:#22333B;
  --muted:#5C6B70; --subtle:#8FA3A9; --line:#D8E3E6;
  --on-dark:#DCE9EC; --on-dark-soft:#9DB8BF; --on-dark-tint:#CDE3E8;
  --ok:#2E8B57;
  --serif:"Fraunces", Cambria, Georgia, serif;
  --sans:"Inter", Calibri, system-ui, sans-serif;
  --r:12px;
  --shadow:0 1px 2px rgba(10,57,69,.05), 0 14px 32px -14px rgba(10,57,69,.18);
}
* { box-sizing: border-box; margin: 0; }
html { background: #E7EEF0; }
body { font-family: var(--sans); color: var(--ink); }

/* ---------- topbar ---------- */
.topbar {
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 28px;
  background: rgba(231,238,240,.85);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
}
.topbar__title { font-weight: 700; font-size: 13px; letter-spacing: .05em; color: var(--teal); }
.topbar__title em { color: var(--subtle); font-style: normal; font-weight: 500; margin-left: 8px; }
.topbar__actions { display: flex; align-items: center; gap: 10px; }
.action-btn {
  font: 600 11px var(--sans); letter-spacing: .08em; text-transform: uppercase;
  padding: 8px 14px; border-radius: 999px; cursor: pointer;
  border: 1px solid var(--teal); background: var(--teal); color: #fff;
  transition: all 160ms ease;
}
.action-btn:hover { background: var(--teal-mid); border-color: var(--teal-mid); }
.action-btn--ghost { background: transparent; color: var(--teal); }
.action-btn--ghost[aria-pressed="true"] { background: var(--teal); color: #fff; }

/* ---------- deck / scaling ---------- */
.deck { display: flex; flex-direction: column; align-items: center; gap: 36px; padding: 36px 24px 72px; }
.slide-viewport { width: min(1240px, 100%); aspect-ratio: 16/9; position: relative; }
.slide {
  width: 1280px; height: 720px;
  position: absolute; top: 0; left: 0;
  transform-origin: top left; transform: scale(var(--s, 1));
  background: #fff; border-radius: 14px; overflow: hidden;
  box-shadow: var(--shadow);
}
.slide--dark { background: var(--teal-dk); color: var(--on-dark); }

/* present mode */
html[data-mode="present"] .topbar { position: fixed; width: 100%; transform: translateY(-110%); transition: transform 220ms ease; }
html[data-mode="present"] .topbar:hover, html[data-mode="present"].chrome .topbar { transform: none; }
html[data-mode="present"] .deck { padding: 0; gap: 0; display: block; height: 100vh; overflow: hidden; }
html[data-mode="present"] .slide-viewport { display: none; position: fixed; inset: 0; width: 100%; height: 100%; aspect-ratio: auto; }
html[data-mode="present"] .slide-viewport.current { display: block; }
html[data-mode="present"] .slide { border-radius: 0; box-shadow: none; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(var(--s,1)); animation: fadein 320ms ease; }
@keyframes fadein { from { opacity: 0 } to { opacity: 1 } }
html[data-mode="present"] { background: #000; }
html[data-mode="present"] body { background: #000; }

.progress { position: fixed; top: 0; left: 0; height: 3px; background: var(--amber); width: 0; z-index: 20; display: none; }
html[data-mode="present"] .progress { display: block; }
.present-nav {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
  display: none; align-items: center; gap: 14px; z-index: 20;
  background: rgba(10,57,69,.85); color: #fff; border-radius: 999px; padding: 8px 16px;
  backdrop-filter: blur(10px); transition: opacity 300ms ease;
  font: 600 11px var(--sans); letter-spacing: .08em;
}
html[data-mode="present"] .present-nav { display: flex; }
.present-nav.idle { opacity: 0; pointer-events: none; }
.present-nav__btn { border: 0; background: transparent; color: #fff; cursor: pointer; font: inherit; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }
.present-nav__btn:hover { background: rgba(255,255,255,.12); }

.slide__pageno { position: absolute; bottom: 20px; right: 26px; font: 600 11px var(--sans); color: var(--subtle); }
.slide--dark .slide__pageno { color: var(--on-dark-soft); }

/* ---------- shared slide frame ---------- */
.frame { position: absolute; inset: 0; padding: 44px 58px 40px; }
.kicker { font: 700 12px var(--sans); letter-spacing: .18em; text-transform: uppercase; color: var(--amber); margin-bottom: 10px; }
.h1 { font-family: var(--serif); font-weight: 800; font-size: 33px; line-height: 1.12; color: var(--teal); letter-spacing: -.01em; }
.slide--dark .h1 { color: #fff; }
.sub { font-size: 15px; color: var(--muted); margin-top: 10px; max-width: 1080px; }
.sub b, .lead b { color: var(--teal); }
.slide--dark .sub { color: var(--on-dark-tint); }
.sources { position: absolute; left: 58px; right: 58px; bottom: 18px; font-size: 9.5px; color: var(--subtle); }
.slide--dark .sources { color: var(--on-dark-soft); }
.icircle {
  width: 46px; height: 46px; border-radius: 50%; flex: none;
  display: flex; align-items: center; justify-content: center;
  background: var(--teal); color: #fff; font-size: 17px;
}
.icircle--amber { background: var(--amber); }
.icircle--mid { background: var(--teal-mid); }

/* ---------- hero (dark title) ---------- */
.hero { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 0 90px; }
.hero__mark { width: 76px; height: 76px; border-radius: 50%; background: var(--teal-mid); color: var(--amber); display: flex; align-items: center; justify-content: center; font-size: 30px; margin-bottom: 32px; }
.hero__title { font-family: var(--serif); font-weight: 900; font-size: 76px; letter-spacing: -.015em; color: #fff; line-height: 1; }
.hero__title .accent { color: var(--amber); }
.hero__tag { font-size: 21px; color: var(--on-dark-tint); margin-top: 26px; max-width: 860px; }
.hero__rule { width: 150px; height: 2px; background: var(--teal-mid); margin: 34px 0 24px; }
.hero__meta { font-weight: 700; font-size: 15px; color: var(--amber); letter-spacing: .02em; }
.hero__team { font-size: 14px; color: var(--on-dark-soft); margin-top: 12px; }

/* ---------- stats-split ---------- */
.ss { display: grid; grid-template-columns: 400px 1fr; gap: 26px; margin-top: 26px; }
.ss__stats, .ss__cards { display: flex; flex-direction: column; gap: 20px; }
.stat { background: var(--light); border-radius: var(--r); padding: 18px 24px; min-height: 138px; }
.stat__n { font-family: var(--serif); font-weight: 800; font-size: 33px; color: var(--amber); line-height: 1.1; }
.stat__t { font-size: 12.5px; color: var(--ink); margin-top: 7px; line-height: 1.45; }
.pain { background: #fff; border: 1px solid var(--line); border-radius: var(--r); padding: 16px 22px; min-height: 138px; display: flex; gap: 20px; align-items: center; }
.pain__h { font-weight: 700; font-size: 15.5px; color: var(--teal); margin-bottom: 6px; }
.pain__t { font-size: 12.5px; line-height: 1.5; }

/* ---------- columns ---------- */
.lead { font-size: 16px; margin-top: 16px; max-width: 1120px; line-height: 1.5; }
.cols { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: 26px; margin-top: 24px; }
.col { background: var(--light); border-radius: var(--r); padding: 26px 26px 24px; }
.col__h { font-weight: 700; font-size: 16.5px; color: var(--teal); margin: 18px 0 4px; }
.col__note { font-size: 12px; font-style: italic; color: var(--muted); margin-bottom: 8px; }
.col__body { font-size: 13px; line-height: 1.55; margin-top: 8px; }
.col ul { padding-left: 18px; margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
.col li { font-size: 12.8px; line-height: 1.5; }
.col li::marker { color: var(--teal-mid); }

/* ---------- tiers + chart ---------- */
.tc { display: grid; grid-template-columns: 570px 1fr; gap: 40px; margin-top: 26px; }
.tiers { display: flex; flex-direction: column; gap: 20px; }
.tier { border-radius: var(--r); padding: 18px 26px; display: grid; grid-template-columns: 172px 1fr; align-items: center; gap: 16px; min-height: 138px; color: #fff; }
.tier[data-shade="1"] { background: var(--teal-dk); }
.tier[data-shade="2"] { background: var(--teal); }
.tier[data-shade="3"] { background: var(--teal-mid); }
.tier__n { font-family: var(--serif); font-weight: 800; font-size: 30px; color: var(--amber); }
.tier__h { font-weight: 700; font-size: 13.5px; }
.tier__t { font-size: 11.5px; color: var(--on-dark-tint); margin-top: 6px; line-height: 1.45; }
.chart { display: flex; flex-direction: column; height: 100%; }
.chart__title { text-align: center; font-weight: 600; font-size: 14.5px; color: var(--teal); margin-bottom: 8px; }
.chart__plot { flex: 1; display: flex; align-items: flex-end; justify-content: space-around; gap: 34px; padding: 6px 26px 0; border-bottom: 1.5px solid var(--line); }
.bar { width: 92px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
.bar__v { font-weight: 600; font-size: 13px; color: var(--ink); margin-bottom: 6px; }
.bar__fill { width: 100%; background: var(--teal); border-radius: 4px 4px 0 0; }
.bar__l { font-size: 12.5px; color: var(--muted); margin-top: 8px; }
.chart__caption { text-align: center; font-size: 11.5px; font-style: italic; color: var(--muted); margin-top: 22px; }

/* ---------- panels (gen1 → gen2) ---------- */
.panels { display: grid; grid-template-columns: 1fr 58px 1fr; align-items: stretch; gap: 0; margin-top: 24px; }
.panel { border-radius: var(--r); padding: 26px 28px; }
.panel--light { background: var(--light); }
.panel--dark { background: var(--teal-dk); color: var(--on-dark); }
.panel__head { display: flex; gap: 16px; align-items: center; margin-bottom: 6px; }
.panel__h { font-weight: 700; font-size: 16px; color: var(--teal); }
.panel--dark .panel__h { color: #fff; }
.panel__note { font-size: 12px; font-style: italic; color: var(--muted); }
.panel--dark .panel__note { color: var(--on-dark-soft); }
.panel ul { padding-left: 18px; margin-top: 14px; display: flex; flex-direction: column; gap: 11px; }
.panel li { font-size: 13px; line-height: 1.5; }
.panel li::marker { color: var(--teal-mid); }
.panels__arrow { display: flex; align-items: center; justify-content: center; color: var(--amber); font-size: 30px; }
.layer { display: grid; grid-template-columns: 40px 1fr; gap: 14px; margin-top: 16px; align-items: start; }
.layer .icircle { width: 40px; height: 40px; font-size: 14px; }
.layer__h { font-weight: 700; font-size: 12.8px; color: var(--amber); }
.layer__t { font-size: 11.8px; color: var(--on-dark); margin-top: 4px; line-height: 1.45; }
.panel__foot { font-size: 11px; font-style: italic; color: var(--on-dark-soft); margin-top: 18px; }

/* ---------- score ---------- */
.sc { display: grid; grid-template-columns: 400px 1fr; gap: 40px; margin-top: 22px; align-items: start; }
.ring-wrap { display: flex; flex-direction: column; align-items: center; padding-top: 14px; }
.ring { width: 320px; height: 320px; border-radius: 50%; background: conic-gradient(var(--amber) calc(var(--pct) * 1%), #EDF2F3 0); display: flex; align-items: center; justify-content: center; }
.ring__hole { width: 178px; height: 178px; border-radius: 50%; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ring__n { font-family: var(--serif); font-weight: 800; font-size: 56px; color: var(--teal); line-height: 1; }
.ring__l { font-size: 11.5px; color: var(--muted); margin-top: 6px; }
.ring-caption { font-size: 12px; font-style: italic; color: var(--muted); text-align: center; margin-top: 24px; max-width: 340px; line-height: 1.5; }
.sc__rows { display: flex; flex-direction: column; gap: 14px; }
.srow { border: 1px solid var(--line); border-radius: 10px; padding: 13px 22px; background: #fff; }
.srow[data-hl="true"] { background: var(--light); }
.srow__h { font-weight: 700; font-size: 13.5px; color: var(--teal); }
.srow__t { font-size: 11.8px; line-height: 1.5; margin-top: 4px; }

/* ---------- matrix ---------- */
.mx { margin-top: 24px; border-collapse: collapse; width: 100%; }
.mx th { background: var(--teal); color: #fff; font-weight: 700; font-size: 12px; padding: 12px 10px; text-align: center; border: 1px solid var(--line); }
.mx th:first-child { width: 27%; }
.mx td { border: 1px solid var(--line); padding: 13px 10px; text-align: center; font-size: 14px; }
.mx td:first-child { text-align: left; font-size: 12.5px; padding-left: 16px; }
.mx tr[data-hl="true"] td { background: #FBF3E3; }
.mx tr[data-hl="true"] td:first-child { font-weight: 700; color: var(--teal); }
.cell--full { color: var(--ok); font-weight: 700; }
.cell--part { color: var(--amber); }
.cell--none { color: #B9C6CA; }
.callout { background: var(--light); border-radius: 10px; padding: 15px 24px; margin-top: 22px; font-size: 12.5px; line-height: 1.55; }
.callout b { color: var(--teal); }

/* ---------- loop (model + flywheel) ---------- */
.lp { display: grid; grid-template-columns: 560px 1fr; gap: 44px; margin-top: 24px; }
.lp__blocks { display: flex; flex-direction: column; gap: 18px; }
.blk { background: var(--light); border-radius: 10px; padding: 15px 24px; min-height: 128px; }
.blk__h { font-weight: 700; font-size: 14px; color: var(--teal); margin-bottom: 6px; }
.blk__t { font-size: 12px; line-height: 1.55; }
.fw { position: relative; }
.fw__title { text-align: center; font-weight: 600; font-size: 15px; color: var(--teal); margin-bottom: 18px; }
.fw__grid { position: relative; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 130px 76px; padding: 0 6px; }
.fw__node { border-radius: 10px; min-height: 88px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 12px 16px; color: #fff; font-weight: 700; font-size: 12px; line-height: 1.45; }
.fw__node[data-shade="1"] { background: var(--teal-dk); }
.fw__node[data-shade="2"] { background: var(--teal-mid); }
.fw__arrow { position: absolute; color: var(--amber); font-size: 26px; }
.fw__arrow--top { top: 32px; left: 50%; transform: translateX(-50%); }
.fw__arrow--right { right: calc(25% - 13px); top: 50%; transform: translateY(-50%) rotate(90deg); }
.fw__arrow--bottom { bottom: 32px; left: 50%; transform: translateX(-50%) rotate(180deg); }
.fw__arrow--left { left: calc(25% - 13px); top: 50%; transform: translateY(-50%) rotate(270deg); }
.fw__hub { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 64px; height: 64px; border-radius: 50%; background: var(--amber); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 22px; }

/* ---------- people ---------- */
.pp { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: 26px; margin-top: 26px; }
.person { background: var(--light); border-radius: var(--r); padding: 24px 24px 20px; }
.person__head { display: flex; gap: 16px; align-items: center; }
.person__init { width: 62px; height: 62px; border-radius: 50%; flex: none; background: var(--teal); color: #fff; display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-weight: 800; font-size: 25px; }
.person[data-accent="true"] .person__init { background: var(--amber); }
.person__name { font-weight: 700; font-size: 16.5px; color: var(--teal); }
.person__role { font-size: 12px; font-style: italic; color: var(--muted); margin-top: 3px; }
.person ul { padding-left: 18px; margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
.person li { font-size: 11.8px; line-height: 1.5; }
.person li::marker { color: var(--teal-mid); }

/* ---------- close (dark ask) ---------- */
.close__sub { font-size: 15.5px; color: var(--on-dark-tint); margin-top: 10px; }
.close__cards { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: 26px; margin-top: 30px; }
.ccard { background: #0F4655; border-radius: var(--r); padding: 24px 24px 22px; min-height: 224px; }
.ccard__h { font-weight: 700; font-size: 15.5px; color: var(--amber); margin: 18px 0 8px; }
.ccard__t { font-size: 12.5px; color: var(--on-dark); line-height: 1.55; }
.close__ms-label { font-weight: 700; font-size: 14.5px; color: #fff; margin-top: 32px; }
.close__ms { font-size: 12.8px; color: var(--on-dark-tint); margin-top: 10px; line-height: 1.6; }
.close__ms .dot { color: var(--amber); margin: 0 10px; }
.close__brand { position: absolute; left: 58px; bottom: 30px; font-family: var(--serif); font-weight: 800; font-size: 15px; color: #fff; }
.close__brand .accent { color: var(--amber); }
.close__brand .tail { color: var(--on-dark-soft); font-weight: 600; font-family: var(--sans); font-size: 12.5px; margin-left: 12px; }

/* ---------- print: one slide per 16:9 page, exact size ---------- */
@media print {
  @page { size: 13.333in 7.5in; margin: 0; }
  html, body { background: #fff; }
  .topbar, .present-nav, .progress { display: none !important; }
  .deck { display: block; padding: 0; }
  .slide-viewport { width: auto; aspect-ratio: auto; page-break-after: always; break-after: page; position: relative; height: 7.5in; }
  .slide { transform: none !important; border-radius: 0; box-shadow: none; position: static;
           width: 13.333in; height: 7.5in; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
}
</style>
</head>
<body>

<div class="progress" id="progress"></div>

<div class="topbar">
  <div class="topbar__title">DECK <em>· Subtitle</em></div>
  <div class="topbar__actions">
    <button class="action-btn action-btn--ghost" id="mode-btn" aria-pressed="false" type="button">Present</button>
    <button class="action-btn" id="print-btn" type="button">Export PDF</button>
  </div>
</div>

<main class="deck" id="deck"></main>

<div class="present-nav" id="present-nav">
  <button class="present-nav__btn" id="nav-prev" type="button">‹ Prev</button>
  <span id="nav-count">1 / 1</span>
  <button class="present-nav__btn" id="nav-next" type="button">Next ›</button>
</div>

<script type="text/yaml" id="content-data">
# Placeholder Deck — template-besharp example
# YAML stream — each slide is one document, separated by `---`.
# Slide types (template-besharp): hero, stats-split, columns, tiers, panels,
#   score, matrix, loop, people, close.
# `hero` and `close` render dark; all others light. Any slide can force dark
#   with `variant: dark`. Use **bold** inside `lead`/`subtitle` for teal emphasis.
# Icons are Font Awesome 6 solid names (fa-house, fa-users, ...).
# This is placeholder content — replace every field with your own. Then run `make sync`.

---
type: hero
icon: fa-bolt
title_parts:
  - text: "Your"
  - text: "Product"
    accent: true
  - text: " Name"
tagline: One-line value proposition — what you do, for whom, and why it matters
meta: "Round Name  ·  Month Year"
team: "Founder, CEO    ·    Founder, CTO    ·    Founder, COO"

---
type: stats-split
kicker: The problem
title: State the problem in a single, memorable sentence.
stats:
  - value: "00%"
    label: Headline statistic that frames the size or urgency of the problem
  - value: 1 in 4
    label: A second proof point — a rate, cost, or trend that makes it concrete
  - value: "~00%"
    label: A third data point reinforcing why this problem persists today
cards:
  - icon: fa-user
    title: Audience one
    body: >-
      Describe the first stakeholder and the pain they feel today. Keep it to
      two or three tight sentences that a reader can absorb at a glance.
  - icon: fa-users
    title: Audience two
    body: >-
      Describe the second stakeholder — who they are, what they want, and why
      current options fall short for them.
  - icon: fa-handshake-angle
    title: Audience three
    body: >-
      Describe the third stakeholder or the broader market pressure that makes
      this problem worth solving now.
sources: >-
  List your sources here — reports, surveys, and datasets that back the numbers
  above. Replace with real citations.

---
type: columns
kicker: Why now
title: Explain the timing — why this is solvable today, not five years ago.
items:
  - icon: fa-chart-line
    title: Trend one
    bullets:
      - First reason the moment is right — a market or demographic shift
      - A supporting data point with a concrete figure
      - A third bullet that reinforces the trend
  - icon: fa-dollar-sign
    title: Trend two
    bullets:
      - "A cost or economic pressure: $00,000/yr median, rising ~0%/yr"
      - A second bullet quantifying the pain
      - Why the status quo can't scale
  - icon: fa-microchip
    title: Trend three
    bullets:
      - A technology or regulatory enabler that just became available
      - What it now makes possible that wasn't possible before
      - Why incumbents are poorly positioned for this shift
sources: >-
  Sources for the trends above — replace with your own citations.

---
type: tiers
kicker: Market
title: Size the market from the top down, then your beachhead.
tiers:
  - value: $0.0T
    shade: 1
    title: TAM — Total addressable market (Year)
    body: The full market you could eventually serve; note the largest segment
  - value: $00B
    shade: 2
    title: SAM — Serviceable market (Year)
    body: The slice your product realistically targets; add a growth rate
  - value: $000M
    shade: 3
    title: SOM — Initial wedge (illustrative)
    body: Your bottoms-up beachhead — units × price × penetration
chart:
  title: Market size over time ($B)
  labels: ["Year 1", "Year 2", "Year 5E"]
  values: [39, 45, 90]
  caption: ~00% CAGR over the period — replace with your projection
sources: >-
  Market-sizing sources here. SOM is a bottoms-up company estimate — label
  assumptions clearly.

---
type: columns
kicker: The solution
title: "Your Product: the one-line description of what you built"
lead: >-
  Two-sentence summary of the solution and the wedge it opens. **Put the single
  most important claim in bold** so it lands first.
items:
  - icon: fa-shield-halved
    title: Pillar one
    body: >-
      Describe the first core capability. What it does, how it works, and why it

  - icon: fa-mobile-screen
    title: Pillar two

  - icon: fa-brain
    title: Pillar three
    accent: true
    body: >-
      Describe the standout pillar — the one that becomes your moat. The accent
      flag highlights it visually.

---
type: panels
kicker: Product
title: What ships now, and what comes next
left:
  icon: fa-box
  title: Phase 1 — available today
  note: What is shipping or pilot-ready
  bullets:
    - First capability that exists today
    - Second capability, described in a short phrase
    - Third capability
    - A fourth item if the list needs it
    - "A fifth item: keep each to one line"
right:
  icon: fa-microchip
  title: Phase 2 — in development
  note: What you are building next, in layers
  layers:
    - icon: fa-bolt
      title: Layer 1 — foundational capability
      body: One sentence on what this layer does and why it matters
    - icon: fa-phone
      title: Layer 2 — building on layer 1
      body: One sentence describing the next layer of value
    - icon: fa-comments
      title: Layer 3 — the differentiated layer
      body: One sentence on the capability that sets you apart
  footnote: + an optional footnote for a caveat, dependency, or consent note

---
type: score
kicker: The wedge
title: "Your key metric: the one number that changes behavior"
score: 87
score_label: metric label
caption: Short description of what the score measures and how it is computed
rows:
  - title: First reason this metric matters
    body: >-
      Explain the insight — for example, that a single clear index drives daily
      habits. Two or three sentences.
  - title: Second reason, highlighted
    highlight: true
    body: >-
      Use the highlight flag for the strongest supporting point. Back it with a
      statistic and a source where possible.
  - title: Third reason
    body: >-
      A benefit to the user, buyer, or ecosystem — why this metric becomes a
      shared language.
  - title: Fourth reason — the moat
    body: >-
      Why this is hard to copy: the data, model, or network effect that
      compounds over time.
sources: >-
  Sources supporting the claims above — replace with your citations.

type: matrix
kicker: Competition
title: Position yourself against alternatives on the axes that matter.
columns:
  - Capability one
  - Capability two
  - Capability three
  - Capability four
  - Capability five
rows:
  - name: Your Product
    highlight: true
    cells: [full, full, full, full, full]
  - name: Competitor A (short descriptor)
    cells: [full, partial, none, partial, none]
  - name: Competitor B (short descriptor)
    cells: [none, none, none, none, none]

    cells: [none, partial, partial, none, partial]

callout:

  text: >-
    Use this box to make the "why the gap is real" argument — a comparable that

sources: >-

  nodes:

      shade: 1

      The largest allocation and what it delivers — for example, product

      The second allocation — traction, pilots, or partnerships you will land.

      The third allocation — key hires or advisory support.

  label: Milestones to next round

  parts:
    - text: "Your"
    - text: "Product"
      accent: true
    - text: " Name"
  text: "·   Your tagline or closing line goes here."

</script>

<script>
/* =====================================================================
   Renderers — pure functions: YAML doc → slide inner HTML
   ===================================================================== */
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
// **bold** in leads/subtitles/callouts
const em = s => esc(s).replace(/\*\*(.+?)\*\*/g, "<b>$1</b>");
const icon = (name, cls="") => `<div class="icircle ${cls}"><i class="fa-solid ${esc(name)}"></i></div>`;
const frameTop = d => `
  ${d.kicker ? `<div class="kicker">${esc(d.kicker)}</div>` : ""}
  <h1 class="h1">${esc(d.title)}</h1>
  ${d.subtitle ? `<p class="sub">${em(d.subtitle)}</p>` : ""}`;
const srcLine = d => d.sources ? `<div class="sources">Sources: ${esc(d.sources)}</div>` : "";

const RENDERERS = {
  hero(d) {
    const parts = (d.title_parts || []).map(p =>
      `<span class="${p.accent ? "accent" : ""}">${esc(p.text)}</span>`).join("");
    return `<div class="frame"><div class="hero">
      ${d.icon ? `<div class="hero__mark"><i class="fa-solid ${esc(d.icon)}"></i></div>` : ""}
      <div class="hero__title">${parts}</div>
      ${d.tagline ? `<div class="hero__tag">${esc(d.tagline)}</div>` : ""}
      <div class="hero__rule"></div>
      ${d.meta ? `<div class="hero__meta">${esc(d.meta)}</div>` : ""}
      ${d.team ? `<div class="hero__team">${esc(d.team)}</div>` : ""}
    </div></div>`;
  },

  "stats-split"(d) {
    return `<div class="frame">${frameTop(d)}
      <div class="ss">
        <div class="ss__stats">${(d.stats || []).map(s => `
          <div class="stat"><div class="stat__n">${esc(s.value)}</div><div class="stat__t">${esc(s.label)}</div></div>`).join("")}
        </div>
        <div class="ss__cards">${(d.cards || []).map(c => `
          <div class="pain">${icon(c.icon)}<div>
            <div class="pain__h">${esc(c.title)}</div>
            <div class="pain__t">${esc(c.body)}</div>
          </div></div>`).join("")}
        </div>
      </div>${srcLine(d)}</div>`;
  },

  columns(d) {
    return `<div class="frame">${frameTop(d)}
      ${d.lead ? `<p class="lead">${em(d.lead)}</p>` : ""}
      <div class="cols">${(d.items || []).map(c => `
        <div class="col">
          ${icon(c.icon, c.accent ? "icircle--amber" : "")}
          <div class="col__h">${esc(c.title)}</div>
          ${c.note ? `<div class="col__note">${esc(c.note)}</div>` : ""}
          ${c.body ? `<div class="col__body">${esc(c.body)}</div>` : ""}
          ${Array.isArray(c.bullets) ? `<ul>${c.bullets.map(b => `<li>${esc(b)}</li>`).join("")}</ul>` : ""}
        </div>`).join("")}
      </div>${srcLine(d)}</div>`;
  },

  tiers(d) {
    const ch = d.chart || {};
    const max = Math.max(...(ch.values || [1]));
    return `<div class="frame">${frameTop(d)}
      <div class="tc">
        <div class="tiers">${(d.tiers || []).map(t => `
          <div class="tier" data-shade="${esc(t.shade || 2)}">
            <div class="tier__n">${esc(t.value)}</div>
            <div><div class="tier__h">${esc(t.title)}</div><div class="tier__t">${esc(t.body)}</div></div>
          </div>`).join("")}
        </div>
        <div class="chart">
          ${ch.title ? `<div class="chart__title">${esc(ch.title)}</div>` : ""}
          <div class="chart__plot">${(ch.values || []).map((v, i) => `
            <div class="bar">
              <div class="bar__v">${esc(v)}</div>
              <div class="bar__fill" style="height:${Math.round(v / max * 82)}%"></div>
            </div>`).join("")}
          </div>
          <div style="display:flex; justify-content:space-around; gap:34px; padding:0 26px;">
            ${(ch.labels || []).map(l => `<div class="bar__l" style="width:92px; text-align:center;">${esc(l)}</div>`).join("")}
          </div>
          ${ch.caption ? `<div class="chart__caption">${esc(ch.caption)}</div>` : ""}
        </div>
      </div>${srcLine(d)}</div>`;
  },

  panels(d) {
    const L = d.left || {}, R = d.right || {};
    return `<div class="frame">${frameTop(d)}
      <div class="panels">
        <div class="panel panel--light">
          <div class="panel__head">${icon(L.icon)}<div>
            <div class="panel__h">${esc(L.title)}</div>
            ${L.note ? `<div class="panel__note">${esc(L.note)}</div>` : ""}
          </div></div>
          ${Array.isArray(L.bullets) ? `<ul>${L.bullets.map(b => `<li>${esc(b)}</li>`).join("")}</ul>` : ""}
        </div>
        <div class="panels__arrow"><i class="fa-solid fa-arrow-right"></i></div>
        <div class="panel panel--dark">
          <div class="panel__head">${icon(R.icon, "icircle--amber")}<div>
            <div class="panel__h">${esc(R.title)}</div>
            ${R.note ? `<div class="panel__note">${esc(R.note)}</div>` : ""}
          </div></div>
          ${(R.layers || []).map(l => `
            <div class="layer">${icon(l.icon, "icircle--mid")}<div>
              <div class="layer__h">${esc(l.title)}</div>
              <div class="layer__t">${esc(l.body)}</div>
            </div></div>`).join("")}
          ${R.footnote ? `<div class="panel__foot">${esc(R.footnote)}</div>` : ""}
        </div>
      </div>${srcLine(d)}</div>`;
  },

  score(d) {
    const pct = Number(d.score) || 0;
    return `<div class="frame">${frameTop(d)}
      <div class="sc">
        <div class="ring-wrap">
          <div class="ring" style="--pct:${pct}">
            <div class="ring__hole">
              <div class="ring__n">${esc(d.score)}</div>
              <div class="ring__l">${esc(d.score_label || "")}</div>
            </div>
          </div>
          ${d.caption ? `<div class="ring-caption">${esc(d.caption)}</div>` : ""}
        </div>
        <div class="sc__rows">${(d.rows || []).map(r => `
          <div class="srow" data-hl="${r.highlight ? "true" : "false"}">
            <div class="srow__h">${esc(r.title)}</div>
            <div class="srow__t">${esc(r.body)}</div>
          </div>`).join("")}
        </div>
      </div>${srcLine(d)}</div>`;
  },

  matrix(d) {
    const CELLS = { full: ["✓", "cell--full"], partial: ["◐", "cell--part"], none: ["—", "cell--none"] };
    return `<div class="frame">${frameTop(d)}
      <table class="mx">
        <tr><th></th>${(d.columns || []).map(c => `<th>${esc(c)}</th>`).join("")}</tr>
        ${(d.rows || []).map(r => `
          <tr data-hl="${r.highlight ? "true" : "false"}">
            <td>${esc(r.name)}</td>
            ${(r.cells || []).map(c => { const [g, cls] = CELLS[c] || CELLS.none; return `<td class="${cls}">${g}</td>`; }).join("")}
          </tr>`).join("")}
      </table>
      ${d.callout ? `<div class="callout"><b>${esc(d.callout.label)}:</b> ${esc(d.callout.text)}</div>` : ""}
      ${srcLine(d)}</div>`;
  },

  loop(d) {
    const fw = d.flywheel || {};
    const nodes = fw.nodes || [];
    return `<div class="frame">${frameTop(d)}
      <div class="lp">
        <div class="lp__blocks">${(d.blocks || []).map(b => `
          <div class="blk"><div class="blk__h">${esc(b.title)}</div><div class="blk__t">${esc(b.body)}</div></div>`).join("")}
        </div>
        <div class="fw">
          ${fw.title ? `<div class="fw__title">${esc(fw.title)}</div>` : ""}
          <div class="fw__grid">
            ${nodes.map(n => `<div class="fw__node" data-shade="${esc(n.shade || 1)}">${esc(n.text)}</div>`).join("")}
            <div class="fw__arrow fw__arrow--top"><i class="fa-solid fa-arrow-right"></i></div>
            <div class="fw__arrow fw__arrow--right"><i class="fa-solid fa-arrow-right"></i></div>
            <div class="fw__arrow fw__arrow--bottom"><i class="fa-solid fa-arrow-right"></i></div>
            <div class="fw__arrow fw__arrow--left"><i class="fa-solid fa-arrow-right"></i></div>
            <div class="fw__hub"><i class="fa-solid fa-rotate"></i></div>
          </div>
        </div>
      </div>${srcLine(d)}</div>`;
  },

  people(d) {
    return `<div class="frame">${frameTop(d)}
      <div class="pp">${(d.people || []).map(p => `
        <div class="person" data-accent="${p.accent ? "true" : "false"}">
          <div class="person__head">
            <div class="person__init">${esc(p.initial)}</div>
            <div><div class="person__name">${esc(p.name)}</div><div class="person__role">${esc(p.role)}</div></div>
          </div>
          <ul>${(p.bullets || []).map(b => `<li>${esc(b)}</li>`).join("")}</ul>
        </div>`).join("")}
      </div>${srcLine(d)}</div>`;
  },

  close(d) {
    const b = d.brand || {};
    return `<div class="frame">
      ${d.kicker ? `<div class="kicker">${esc(d.kicker)}</div>` : ""}
      <h1 class="h1">${esc(d.title)}</h1>
      ${d.subtitle ? `<p class="close__sub">${esc(d.subtitle)}</p>` : ""}
      <div class="close__cards">${(d.cards || []).map(c => `
        <div class="ccard">${icon(c.icon, "icircle--amber")}
          <div class="ccard__h">${esc(c.title)}</div>
          <div class="ccard__t">${esc(c.body)}</div>
        </div>`).join("")}
      </div>
      ${d.milestones ? `
        <div class="close__ms-label">${esc(d.milestones.label)}</div>
        <div class="close__ms">${(d.milestones.items || []).map(esc).join('<span class="dot">·</span>')}</div>` : ""}
      ${b.text ? `<div class="close__brand">${(b.parts || []).map(p => `<span class="${p.accent ? "accent" : ""}">${esc(p.text)}</span>`).join("")}<span class="tail">${esc(b.text)}</span></div>` : ""}
    </div>`;
  },
};

const DARK_TYPES = new Set(["hero", "close"]);

function renderSlides(docs) {
  return docs.map((d, i) => {
    const fn = RENDERERS[d.type];
    const inner = fn ? fn(d) : `<div class="frame"><h1 class="h1">Unknown slide type: ${esc(d.type)}</h1></div>`;
    const dark = DARK_TYPES.has(d.type) || d.variant === "dark";
    return `<div class="slide-viewport"><div class="slide ${dark ? "slide--dark" : ""}">
      ${inner}<div class="slide__pageno">${i + 1} / ${docs.length}</div>
    </div></div>`;
  }).join("");
}

/* =====================================================================
   Boot + chrome (Review / Present, scaling, keyboard, print)
   ===================================================================== */
(function boot() {
  const raw = document.getElementById("content-data").textContent.trim();
  if (!raw) { document.getElementById("deck").innerHTML = "<p style='padding:40px'>No content — edit content.md and run <code>make sync</code>.</p>"; return; }
  const docs = jsyaml.loadAll(raw).filter(Boolean);
  document.getElementById("deck").innerHTML = DOMPurify.sanitize(renderSlides(docs), { ADD_ATTR: ["style"] });

  const viewports = [...document.querySelectorAll(".slide-viewport")];
  const total = viewports.length;
  let current = 0;

  // --- scaling: slides are a fixed 1280x720 canvas, scaled to fit their viewport
  function rescale() {
    const present = document.documentElement.dataset.mode === "present";
    viewports.forEach(vp => {
      const slide = vp.querySelector(".slide");
      const s = present
        ? Math.min(window.innerWidth / 1280, window.innerHeight / 720)
        : vp.clientWidth / 1280;
      slide.style.setProperty("--s", s);
    });
  }
  new ResizeObserver(rescale).observe(document.body);
  window.addEventListener("resize", rescale);

  // --- present mode
  const modeBtn = document.getElementById("mode-btn");
  const progress = document.getElementById("progress");
  const navPrev = document.getElementById("nav-prev");
  const navNext = document.getElementById("nav-next");
  const navCount = document.getElementById("nav-count");
  const presentNav = document.getElementById("present-nav");

  function show(i) {
    current = Math.max(0, Math.min(total - 1, i));
    viewports.forEach((vp, k) => vp.classList.toggle("current", k === current));
    progress.style.width = ((current + 1) / total * 100) + "%";
    navCount.textContent = (current + 1) + " / " + total;
  }
  function setMode(mode) {
    document.documentElement.dataset.mode = mode;
    modeBtn.setAttribute("aria-pressed", String(mode === "present"));
    modeBtn.textContent = mode === "present" ? "Review" : "Present";
    localStorage.setItem("deck-mode", mode);
    if (mode === "present") show(current);
    rescale();
  }
  modeBtn.addEventListener("click", () => setMode(document.documentElement.dataset.mode === "present" ? "review" : "present"));
  navPrev.addEventListener("click", () => show(current - 1));
  navNext.addEventListener("click", () => show(current + 1));

  document.addEventListener("keydown", e => {
    if (document.documentElement.dataset.mode !== "present") return;
    if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); show(current + 1); }
    else if (e.key === "ArrowLeft") show(current - 1);
    else if (e.key === "Home") show(0);
    else if (e.key === "End") show(total - 1);
    else if (e.key === "Escape") setMode("review");
  });

  // nav fades after 2s idle
  let idleTimer;
  document.addEventListener("mousemove", () => {
    presentNav.classList.remove("idle");
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => presentNav.classList.add("idle"), 2000);
  });

  // print always from review layout
  document.getElementById("print-btn").addEventListener("click", () => {
    const was = document.documentElement.dataset.mode;
    setMode("review");
    setTimeout(() => { window.print(); if (was === "present") setMode("present"); }, 60);
  });

  setMode(localStorage.getItem("deck-mode") || "review");
  show(0);
  rescale();
})();
</script>
